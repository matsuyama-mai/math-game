<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="楽しみながら面積の単位変換を学べる小学生向け算数ゲーム">
  <title>面積マスター ～単位へんかんチャレンジ～</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 紙吹雪コンテナ -->
  <div id="confetti-container"></div>

  <!-- タイトル画面 -->
  <div id="title-screen" class="screen active">
    <div class="title-card">
      <div class="title-icon">📐</div>
      <h1>面積マスター</h1>
      <p class="subtitle">～単位へんかんチャレンジ～</p>
      <div class="unit-badges">
        <span class="badge">cm²</span>
        <span class="badge">m²</span>
        <span class="badge">a</span>
        <span class="badge">ha</span>
        <span class="badge">km²</span>
      </div>
      <div class="level-select">
        <p class="level-label">レベルをえらんでね！</p>
        <button class="level-btn level-easy" data-level="1" id="btn-level-1">
          <span class="level-star">⭐</span>
          <span class="level-name">かんたん</span>
          <span class="level-desc">となりの単位</span>
        </button>
        <button class="level-btn level-normal" data-level="2" id="btn-level-2">
          <span class="level-star">⭐⭐</span>
          <span class="level-name">ふつう</span>
          <span class="level-desc">少しはなれた単位</span>
        </button>
        <button class="level-btn level-hard" data-level="3" id="btn-level-3">
          <span class="level-star">⭐⭐⭐</span>
          <span class="level-name">むずかしい</span>
          <span class="level-desc">すべての単位</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <div class="score-area">
        <div class="score-item">
          <span class="score-icon">✅</span>
          <span class="score-label">せいかい</span>
          <span class="score-value" id="correct-count">0</span>
        </div>
        <div class="score-item">
          <span class="score-icon">🔥</span>
          <span class="score-label">れんぞく</span>
          <span class="score-value" id="streak-count">0</span>
        </div>
        <div class="score-item">
          <span class="score-icon">❓</span>
          <span class="score-label">もんだい</span>
          <span class="score-value" id="question-number">1</span>
          <span class="score-total">/ 10</span>
        </div>
      </div>
      <button class="back-btn" id="btn-back">🏠 もどる</button>
    </div>

    <div class="question-card" id="question-card">
      <div class="question-label">もんだい</div>
      <div class="question-text" id="question-text"></div>
      <div class="answer-area">
        <input type="number" id="answer-input" class="answer-input" placeholder="こたえを入力" autocomplete="off" step="any">
        <span class="answer-unit" id="answer-unit"></span>
      </div>
      <button class="submit-btn" id="btn-submit">こたえあわせ！</button>
      <div class="hint-area">
        <button class="hint-btn" id="btn-hint">💡 ヒントを見る</button>
        <div class="hint-box" id="hint-box"></div>
      </div>
    </div>

    <!-- 正解/不正解表示 -->
    <div class="result-overlay" id="result-overlay">
      <div class="result-content" id="result-content">
        <div class="result-icon" id="result-icon"></div>
        <div class="result-text" id="result-text"></div>
        <div class="result-answer" id="result-answer"></div>
        <button class="next-btn" id="btn-next">つぎのもんだい →</button>
      </div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" class="screen">
    <div class="result-card">
      <div class="result-title-icon" id="final-icon">🏆</div>
      <h2 class="result-title">けっか</h2>
      <div class="final-score">
        <div class="final-score-number" id="final-score">0</div>
        <div class="final-score-label">/ 10 もんせいかい！</div>
      </div>
      <div class="final-message" id="final-message"></div>
      <div class="final-streak">
        <span>🔥 さいこうれんぞくせいかい：</span>
        <span id="final-streak">0</span>
      </div>
      <div class="result-actions">
        <button class="retry-btn" id="btn-retry">もういちどチャレンジ！</button>
        <button class="home-btn" id="btn-home">🏠 タイトルにもどる</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
